<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ingest" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Ingest - Downloads</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#2563eb" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="app-name">Ingest</div>
          <div class="app-subtitle">Recent downloads</div>
        </div>
        <nav class="topbar-nav">
          <a href="/">Chat</a>
          <a href="/downloads" aria-current="page">Downloads</a>
          <a href="/settings">Settings</a>
        </nav>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel table-panel">
        <div class="panel-head">
          <div>
            <h1>Downloads</h1>
            <p>Latest torrent records and resolved save paths.</p>
          </div>
          <button id="refreshButton" class="button" type="button">Refresh</button>
        </div>

        <div class="downloads-banner">
          <div class="downloads-banner-copy">
            <span class="downloads-banner-kicker">Live queue</span>
            <strong>Progress updates stay in sync with qBittorrent.</strong>
          </div>
          <div id="downloadsSummary" class="downloads-summary">Loading</div>
        </div>

        <div id="downloadsBody" class="downloads-list" aria-label="Downloads list"></div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary">
      <a href="/">Chat</a>
      <a href="/downloads" aria-current="page">Downloads</a>
      <a href="/settings">Settings</a>
    </nav>

    <script src="/downloads.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
