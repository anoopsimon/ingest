<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ingest" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Ingest - Settings</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#22c55e" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="app-name">Ingest</div>
          <div class="app-subtitle">Path map</div>
        </div>
        <nav class="topbar-nav">
          <a href="/">Chat</a>
          <a href="/downloads">Downloads</a>
          <a href="/settings" aria-current="page">Settings</a>
        </nav>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel settings-panel">
        <div class="panel-head">
          <div>
            <h1>Language mappings</h1>
            <p>SQLite-backed path map. Chat chips and save paths read from here first.</p>
          </div>
          <button id="newButton" class="button" type="button">New mapping</button>
        </div>

        <div class="settings-banner">
          <div>
            <span class="settings-banner-kicker">Editable in app</span>
            <strong>Add Malayalam, English, Tamil, Hindi, Telugu, or anything else you want to route.</strong>
          </div>
          <div id="settingsSummary" class="settings-summary">Loading</div>
        </div>

        <form id="mappingForm" class="settings-form">
          <input id="mappingKey" type="hidden" />
          <div class="settings-grid">
            <label class="field">
              <span>Language label</span>
              <input id="mappingLabel" type="text" placeholder="Telugu" required />
            </label>
            <label class="field">
              <span>Key</span>
              <input id="mappingSlug" type="text" placeholder="telugu" />
            </label>
            <label class="field field-wide">
              <span>Base path</span>
              <input id="mappingBasePath" type="text" placeholder="/mnt/media/telugu" required />
            </label>
            <label class="field">
              <span>Sort order</span>
              <input id="mappingSortOrder" type="number" step="1" value="0" />
            </label>
            <label class="field field-switch">
              <span>Enabled</span>
              <label class="switch">
                <input id="mappingEnabled" type="checkbox" checked />
                <span>Show in chat</span>
              </label>
            </label>
          </div>

          <div class="settings-actions">
            <button class="button primary" type="submit">Save mapping</button>
            <button id="resetButton" class="button" type="button">Reset</button>
          </div>
        </form>

        <div id="settingsList" class="settings-list" aria-live="polite"></div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary">
      <a href="/">Chat</a>
      <a href="/downloads">Downloads</a>
      <a href="/settings" aria-current="page">Settings</a>
    </nav>

    <script src="/settings.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
